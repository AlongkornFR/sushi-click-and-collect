# fly.toml app configuration file generated for sushi-click-and-collect on 2026-04-22T09:32:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sushi-click-and-collect'
primary_region = 'fra'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[statics]]
  guest_path = '/code/staticfiles'
  url_prefix = '/static/'
